<div class="stories-shell" id="story-feed-shell" data-i18n-auto>
  <button
    type="button"
    class="story-feed-nav story-feed-nav-prev is-hidden"
    id="storyFeedPrevBtn"
    aria-label="Previous stories"
    data-i18n-aria-label="story.feed.previousStoriesAria"
  >
    <i data-lucide="chevron-left"></i>
  </button>

  <div class="stories" id="story-feed" data-i18n-user-content></div>

  <button
    type="button"
    class="story-feed-nav story-feed-nav-next is-hidden"
    id="storyFeedNextBtn"
    aria-label="Next stories"
    data-i18n-aria-label="story.feed.nextStoriesAria"
  >
    <i data-lucide="chevron-right"></i>
  </button>
</div>
