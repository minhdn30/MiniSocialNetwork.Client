<div class="admin-shell">
  <div class="admin-mobile-backdrop" id="adminSidebarBackdrop" hidden></div>

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-scroll">
      <div class="admin-brand">
        <div class="admin-brand-mark">
          <i data-lucide="shield-check"></i>
        </div>
        <div class="admin-brand-copy">
          <div class="admin-brand-title" data-i18n="admin.brandTitle">
            CloudM Admin
          </div>
          <div class="admin-brand-subtitle" data-i18n="admin.brandSubtitle">
            Operations console
          </div>
        </div>
      </div>

      <section class="admin-account-card">
        <div class="admin-account-avatar" id="adminCurrentInitials">AD</div>
        <div class="admin-account-copy">
          <div class="admin-account-name" id="adminCurrentName">Admin</div>
          <div class="admin-account-meta" id="adminCurrentMeta">
            admin@cloudm.local
          </div>
        </div>
        <div
          class="admin-account-role"
          id="adminCurrentRole"
          data-i18n="admin.profile.adminRole"
        >
          Admin
        </div>
      </section>

      <nav
        class="admin-sidebar-group"
        data-i18n-aria-label="admin.sidebar.ariaLabel"
        aria-label="Admin workspace"
      >
        <div class="admin-sidebar-label" data-i18n="admin.sidebar.control">
          Workspace
        </div>

        <button
          type="button"
          class="admin-nav-item active"
          data-admin-view="overview"
          aria-current="page"
        >
          <i data-lucide="layout-dashboard"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.overview"
            >Overview</span
          >
        </button>

        <button type="button" class="admin-nav-item" data-admin-view="security">
          <i data-lucide="key-round"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.security"
            >Security</span
          >
        </button>

        <button type="button" class="admin-nav-item" data-admin-view="accounts">
          <i data-lucide="search-check"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.accounts"
            >Accounts</span
          >
        </button>

        <button
          type="button"
          class="admin-nav-item"
          data-admin-view="moderation"
        >
          <i data-lucide="shield-alert"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.moderation"
            >Moderation</span
          >
        </button>

        <button type="button" class="admin-nav-item" data-admin-view="reports">
          <i data-lucide="files"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.reports"
            >Reports</span
          >
        </button>

        <button
          type="button"
          class="admin-nav-item"
          data-admin-view="audit-log"
        >
          <i data-lucide="history"></i>
          <span class="admin-nav-title" data-i18n="admin.nav.auditLog"
            >Audit log</span
          >
        </button>
      </nav>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div class="admin-topbar-copy">
        <div class="admin-topbar-row">
          <button
            type="button"
            class="admin-icon-btn admin-mobile-toggle"
            id="adminSidebarToggle"
            data-i18n-aria-label="admin.actions.openMenu"
            aria-label="Open navigation"
          >
            <i data-lucide="panel-left-open"></i>
          </button>
          <span class="admin-topbar-label" data-i18n="admin.topbar.label"
            >Operations</span
          >
        </div>

        <div class="admin-topbar-heading-row">
          <h1
            class="admin-topbar-title"
            id="adminTopbarTitle"
            data-i18n="admin.topbar.views.overviewTitle"
          >
            Operations
          </h1>
          <span
            class="admin-chip"
            id="adminTopbarStep"
            data-i18n="admin.topbar.views.overviewStep"
          >
            Live
          </span>
        </div>

        <p
          class="admin-topbar-subtitle"
          id="adminTopbarSubtitle"
          data-i18n="admin.topbar.views.overviewSubtitle"
        >
          Manage accounts, content, reports and audit from one place.
        </p>
      </div>

      <div class="admin-topbar-side">
        <div class="admin-topbar-actions">
          <div class="admin-topbar-stamp" id="adminTopbarTimestamp">--</div>
          <button type="button" class="admin-action-btn" id="adminThemeToggle">
            <i data-lucide="sun-moon"></i>
            <span data-i18n="admin.actions.toggleTheme">Toggle theme</span>
          </button>
          <button type="button" class="admin-action-btn" id="adminLogoutBtn">
            <i data-lucide="log-out"></i>
            <span data-i18n="admin.actions.logout">Sign out</span>
          </button>
        </div>
      </div>
    </header>

    <div class="admin-shell-content" id="adminShellContent"></div>
  </main>
</div>
