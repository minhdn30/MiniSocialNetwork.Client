<div class="modal-overlay" id="createGroupModal">
  <div class="modal-container cg-modal">
    <!-- Header -->
    <div class="modal-header cg-header">
      <h2 class="modal-title" data-i18n="chat.group_modal.create_new_group"></h2>
      <button
        class="modal-back-btn"
        onclick="closeCreateChatGroupModal()"
        data-i18n-title="common.buttons.close"
        data-i18n-aria-label="common.buttons.close"
      >
        <i data-lucide="x" size="22"></i>
      </button>
    </div>

    <!-- Body: Two-Column Layout -->
    <div class="cg-body">
      <!-- LEFT: Group Setup + Selected Members -->
      <div class="cg-left">
        <!-- Avatar Upload -->
        <div class="cg-avatar-section">
          <div
            class="cg-avatar-circle"
            id="cg-avatar-circle"
            onclick="document.getElementById('group-avatar-input').click()"
          >
            <i
              data-lucide="users"
              class="cg-avatar-icon"
              id="cg-avatar-icon"
            ></i>
            <img
              id="group-avatar-preview"
              class="cg-avatar-img hidden"
              alt=""
              data-i18n-alt="chat.group_modal.avatar_alt"
            />
            <button
              type="button"
              class="cg-avatar-remove hidden"
              id="group-avatar-remove-btn"
              onclick="event.stopPropagation()"
            >
              <i data-lucide="x" size="12"></i>
            </button>
          </div>
          <input type="file" id="group-avatar-input" hidden accept="image/*" />
          <span
            class="cg-avatar-label"
            onclick="document.getElementById('group-avatar-input').click()"
            data-i18n="chat.group_modal.upload_group_photo"
          ></span>
        </div>

        <!-- Group Name -->
        <div class="cg-field">
          <label class="cg-label" data-i18n="chat.group_modal.group_name_label"></label>
          <input
            type="text"
            class="cg-input"
            id="group-name-input"
            placeholder=""
            data-i18n-placeholder="chat.group_modal.group_name_placeholder"
          />
        </div>

        <!-- Selected Members Section -->
        <div class="cg-selected-section">
          <div class="cg-selected-header">
            <span class="cg-label" data-i18n="chat.group_modal.members_label"></span>
            <span class="cg-selected-count" id="cg-selected-count"
            ></span>
          </div>
          <div
            class="cg-selected-chips hidden"
            id="selected-members-list"
          ></div>
          <div class="cg-no-members-hint" id="cg-no-members-hint">
            <i data-lucide="user-plus" size="20"></i>
            <span data-i18n="chat.group_modal.select_members_hint"></span>
          </div>
        </div>
      </div>

      <!-- RIGHT: Search + Friend List -->
      <div class="cg-right">
        <div class="cg-members-header">
          <span class="cg-label" data-i18n="chat.group_modal.add_members_label"></span>
        </div>

        <div class="cg-field cg-search-field">
          <i data-lucide="search" size="16" class="cg-search-icon"></i>
          <input
            type="text"
            class="cg-input cg-search-input"
            id="member-search-input"
            placeholder=""
            data-i18n-placeholder="chat.group_modal.search_users_placeholder"
          />
        </div>

        <!-- Friend List -->
        <div class="cg-friend-list" id="friend-selection-list">
          <div class="cg-skeleton-item"></div>
          <div class="cg-skeleton-item"></div>
          <div class="cg-skeleton-item"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="cg-footer">
      <button
        class="cg-btn-cancel"
        onclick="closeCreateChatGroupModal()"
        data-i18n="common.buttons.cancel"
      ></button>
      <button
        class="cg-btn-create"
        id="btn-create-group"
        disabled
        data-i18n="chat.group_modal.create_group_action"
      ></button>
    </div>
  </div>
</div>
